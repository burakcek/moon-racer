<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>🚀 Tunnel Shooter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  body {
    background: #0a0a14;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    touch-action: none;
    overflow: hidden;
  }
  #gameWrap {
    background: #111122;
    border-radius: 24px;
    padding: 12px;
    box-shadow: 0 0 60px rgba(0,150,255,0.15), inset 0 0 30px rgba(0,100,255,0.05);
    border: 1px solid #2a3a6a;
  }
  canvas {
    display: block;
    width: 100%;
    max-width: 420px;
    height: auto;
    aspect-ratio: 400 / 700;
    background: #0b0e1a;
    border-radius: 16px;
    touch-action: none;
    cursor: pointer;
  }
  #ui {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 10px 4px 10px;
    color: #8ab4f8;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  #ui span { color: #f5d742; }
  .btn-reset {
    background: #1a2a4a;
    border: 1px solid #3a5a8a;
    color: #aac8ff;
    padding: 4px 16px;
    border-radius: 30px;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn-reset:hover { background: #2a4a7a; }
  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 6px 0 2px 0;
    color: #4a6a8a;
    font-size: 11px;
    flex-wrap: wrap;
  }
  @media (max-width: 440px) {
    #gameWrap { padding: 6px; }
    #ui { font-size: 12px; }
    .controls { font-size: 10px; gap: 8px; }
  }
</style>
</head>
<body>

<div id="gameWrap">
  <div id="ui">
    <div>🚀 SCORE <span id="scoreDisplay">0</span></div>
    <div>❤️ <span id="livesDisplay">3</span></div>
    <button class="btn-reset" id="resetBtn">↻</button>
  </div>
  <canvas id="gameCanvas" width="400" height="700"></canvas>
  <div class="controls">
    <span>← → движи</span>
    <span>🖱️ клик = пука</span>
    <span>👆 допир = пука</span>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────────────────
//  TUNNEL SHOOTER — вселенски шутер со тунел ефект
// ──────────────────────────────────────────────────────────────

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 400, H = 700;

const scoreSpan = document.getElementById('scoreDisplay');
const livesSpan = document.getElementById('livesDisplay');

// ─── Играчки променливи ────────────────────────────────────────
let gameOver = false;
let score = 0;
let lives = 3;
let level = 1;
let frame = 0;

// ─── Играч (брод) ─────────────────────────────────────────────
const player = {
  x: 180, y: 580,
  w: 40, h: 32,
  speed: 5,
  vx: 0,
  // Изглед на брод (повеќе детали во draw)
};

// ─── Тунел параметри ───────────────────────────────────────────
let tunnelOffset = 0;
const tunnelSpeed = 0.8;

// ─── Списоци ──────────────────────────────────────────────────
let bullets = [];
let enemies = [];
let enemyBullets = [];
let stars = [];

// ─── Иницијализација на ѕвезди (позадина) ────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 1.5 + 0.3,
      brightness: Math.random() * 0.6 + 0.4,
    });
  }
}
initStars();

// ─── Контроли ──────────────────────────────────────────────────
const keys = { left: false, right: false };

// ─── Иницијализација ──────────────────────────────────────────
function initGame() {
  gameOver = false;
  score = 0;
  lives = 3;
  level = 1;
  frame = 0;
  player.x = 180;
  player.vx = 0;
  bullets = [];
  enemies = [];
  enemyBullets = [];
  initStars();
  updateUI();
}

function updateUI() {
  scoreSpan.textContent = score;
  livesSpan.textContent = lives;
}

// ─── Помошни функции ──────────────────────────────────────────
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

function distance(x1,y1,x2,y2) { return Math.hypot(x2-x1, y2-y1); }

function rectCollide(r1, r2) {
  return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
         r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
}

// ─── Спаунинг на непријатели ──────────────────────────────────
function spawnEnemy() {
  const size = rand(20, 34);
  const type = Math.random() < 0.3 ? 'tank' : 'normal';
  enemies.push({
    x: rand(20, W - 20 - size),
    y: -size,
    w: size,
    h: size,
    speed: rand(0.6, 1.2 + level * 0.08),
    hp: type === 'tank' ? 3 : 1,
    type: type,
    color: type === 'tank' ? '#ff6b4a' : '#ff4a8a',
    shootTimer: 0,
    shootInterval: randInt(60, 150) - level * 2,
  });
}

// ─── Пукање на играчот ─────────────────────────────────────────
function shootBullet() {
  bullets.push({
    x: player.x + player.w/2 - 3,
    y: player.y - 8,
    w: 6,
    h: 18,
    speed: 8,
    damage: 1,
  });
  // Мал ефект на пукање (за подоцна)
}

// ─── Ажурирање ──────────────────────────────────────────────────
function update() {
  if (gameOver) return;
  frame++;
  tunnelOffset = (tunnelOffset + tunnelSpeed) % 100;

  // ── Движење на играчот ──────────────────────────────────────
  if (keys.left) player.vx = -player.speed;
  else if (keys.right) player.vx = player.speed;
  else player.vx *= 0.85;
  player.x += player.vx;
  if (player.x < 5) player.x = 5;
  if (player.x + player.w > W - 5) player.x = W - 5 - player.w;

  // ── Автоматско пукање (секој 12-ти кадар) ──────────────────
  if (frame % 12 === 0) shootBullet();

  // ── Спаунинг непријатели ────────────────────────────────────
  if (frame % Math.max(20, 60 - level * 2) === 0) {
    spawnEnemy();
  }

  // ── Ажурирање на непријатели ────────────────────────────────
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    e.shootTimer++;
    // Пукање (само ако е доволно блиску)
    if (e.shootTimer >= e.shootInterval && e.y > 30 && e.y < 500) {
      enemyBullets.push({
        x: e.x + e.w/2 - 4,
        y: e.y + e.h,
        w: 8,
        h: 14,
        speed: 2.5 + level * 0.1,
      });
      e.shootTimer = 0;
    }
    if (e.y > H + 30) { enemies.splice(i, 1); continue; }
    // Судир со играч
    if (rectCollide(player, e)) {
      lives--;
      updateUI();
      enemies.splice(i, 1);
      if (lives <= 0) gameOver = true;
      continue;
    }
    // Судир со куршуми
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (rectCollide(b, e)) {
        bullets.splice(j, 1);
        e.hp--;
        if (e.hp <= 0) {
          score += e.type === 'tank' ? 30 : 15;
          enemies.splice(i, 1);
          updateUI();
          // Зголеми ниво на секои 100 поени
          if (score > 0 && score % 100 < 15) level = Math.min(10, Math.floor(score / 100) + 1);
        }
        break;
      }
    }
  }

  // ── Куршуми на играчот ──────────────────────────────────────
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= bullets[i].speed;
    if (bullets[i].y < -10) bullets.splice(i, 1);
  }

  // ── Непријателски куршуми ────────────────────────────────────
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const eb = enemyBullets[i];
    eb.y += eb.speed;
    if (eb.y > H + 20) { enemyBullets.splice(i, 1); continue; }
    if (rectCollide(player, eb)) {
      lives--;
      updateUI();
      enemyBullets.splice(i, 1);
      if (lives <= 0) gameOver = true;
    }
  }

  // ── Ажурирање на ѕвезди (позадина) ──────────────────────────
  for (const star of stars) {
    star.y += star.speed;
    if (star.y > H) { star.y = 0; star.x = Math.random() * W; }
  }

  // ── Зголемување на нивото ────────────────────────────────────
  // (веќе се зголемува преку score)
}

// ─── ЦРТАЊЕ ──────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // ── Позадина: градиент ──────────────────────────────────────
  const grad = ctx.createRadialGradient(200, 350, 50, 200, 350, 350);
  grad.addColorStop(0, '#1a1a3a');
  grad.addColorStop(0.5, '#0f0f24');
  grad.addColorStop(1, '#050510');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // ── ТУНЕЛ ЕФЕКТ (кругови кои се движат кон играчот) ──────
  for (let i = 0; i < 12; i++) {
    const radius = 40 + i * 28;
    const alpha = 0.06 + (i / 12) * 0.08;
    const offset = (tunnelOffset + i * 8) % 100;
    const yOffset = offset * 2 - 100;
    ctx.strokeStyle = `rgba(60, 140, 255, ${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(200, 300 + yOffset * 0.6, radius * (1 + offset * 0.003), radius * 0.5 * (1 + offset * 0.003), 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // ── Ѕвезди ──────────────────────────────────────────────────
  for (const star of stars) {
    ctx.globalAlpha = star.brightness;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Непријателски куршуми ──────────────────────────────────
  for (const eb of enemyBullets) {
    ctx.shadowColor = 'rgba(255,80,80,0.6)';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#ff4a4a';
    ctx.fillRect(eb.x, eb.y, eb.w, eb.h);
    ctx.shadowBlur = 0;
  }

  // ── Куршуми на играчот ──────────────────────────────────────
  for (const b of bullets) {
    ctx.shadowColor = 'rgba(100,200,255,0.8)';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#7fc9ff';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
    // траг
    ctx.fillStyle = 'rgba(127,201,255,0.2)';
    ctx.fillRect(b.x + 1, b.y + b.h, 4, 10);
  }

  // ── Непријатели ──────────────────────────────────────────────
  for (const e of enemies) {
    ctx.shadowColor = `rgba(255,80,80,0.4)`;
    ctx.shadowBlur = 16;
    // тело
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.ellipse(e.x + e.w/2, e.y + e.h/2, e.w/2, e.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // очи/светла
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e.x + e.w * 0.25, e.y + e.h * 0.3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(e.x + e.w * 0.75, e.y + e.h * 0.3, 3, 0, Math.PI * 2);
    ctx.fill();
    // HP индикатор за тенкови
    if (e.type === 'tank') {
      ctx.fillStyle = '#ff6b4a';
      ctx.fillRect(e.x + 4, e.y - 6, (e.w - 8) * (e.hp / 3), 4);
      ctx.fillStyle = '#4aff4a';
      ctx.fillRect(e.x + 4, e.y - 6, (e.w - 8) * (e.hp / 3), 4);
    }
  }

  // ── Играч (брод/авион) ──────────────────────────────────────
  const px = player.x, py = player.y;
  // сенка
  ctx.shadowColor = 'rgba(0,200,255,0.25)';
  ctx.shadowBlur = 30;
  // тело на бродот
  ctx.fillStyle = '#4a9aff';
  ctx.beginPath();
  ctx.moveTo(px + player.w/2, py - 4);
  ctx.lineTo(px + player.w - 6, py + player.h - 6);
  ctx.lineTo(px + 6, py + player.h - 6);
  ctx.closePath();
  ctx.fill();
  // кабина
  ctx.fillStyle = '#7fc9ff';
  ctx.beginPath();
  ctx.arc(px + player.w/2, py + 4, 10, 0, Math.PI * 2);
  ctx.fill();
  // крилја
  ctx.fillStyle = '#3a7acc';
  ctx.fillRect(px - 6, py + 10, 6, 10);
  ctx.fillRect(px + player.w, py + 10, 6, 10);
  // мотор (светло)
  ctx.shadowBlur = 20;
  ctx.shadowColor = 'rgba(100,200,255,0.8)';
  ctx.fillStyle = '#7fc9ff';
  ctx.beginPath();
  ctx.arc(px + player.w/2, py + player.h - 2, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // ── UI info на екранот ──────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`LVL ${level}`, 10, 22);

  // ── Game Over ────────────────────────────────────────────────
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 280, W, 100);
    ctx.fillStyle = '#ff6b6b';
    ctx.font = 'bold 34px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('💥 GAME OVER', W/2, 335);
    ctx.fillStyle = '#aac8ff';
    ctx.font = '16px Arial';
    ctx.fillText('Tap/Click to restart', W/2, 365);
  }
}

// ─── ГЛАВНА ЛУПА ──────────────────────────────────────────────
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ─── РЕСТАРТ ──────────────────────────────────────────────────
function restart() { initGame(); }

// ─── КОНТРОЛИ ──────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { keys.left = true; e.preventDefault(); }
  if (e.key === 'ArrowRight') { keys.right = true; e.preventDefault(); }
  if (e.key === 'r' || e.key === 'R') restart();
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft') { keys.left = false; e.preventDefault(); }
  if (e.key === 'ArrowRight') { keys.right = false; e.preventDefault(); }
});

// ─── Допир / клик за пукање ──────────────────────────────────
canvas.addEventListener('click', (e) => {
  if (gameOver) { restart(); return; }
  // пукање при клик (и така автоматски пука, но ова е дополнително)
});

// ─── Допир контроли за телефон ──────────────────────────────
let touchX = null;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameOver) { restart(); return; }
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const touch = e.touches[0];
  const canvasX = (touch.clientX - rect.left) * scaleX;
  touchX = canvasX;
  if (canvasX < player.x) keys.left = true, keys.right = false;
  else if (canvasX > player.x + player.w) keys.left = false, keys.right = true;
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const touch = e.touches[0];
  const canvasX = (touch.clientX - rect.left) * scaleX;
  if (canvasX < player.x + 5) keys.left = true, keys.right = false;
  else if (canvasX > player.x + player.w - 5) keys.left = false, keys.right = true;
  else keys.left = false, keys.right = false;
});
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  keys.left = false; keys.right = false;
});
canvas.addEventListener('touchcancel', (e) => {
  keys.left = false; keys.right = false;
});

// ─── Ресет копче ──────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', restart);

// ─── СТАРТ ─────────────────────────────────────────────────────
initGame();
gameLoop();
</script>
</body>
</html>
